services:

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${CACHE_REDIS_PASSWORD}
    volumes:
      - redis:/data
    restart: unless-stopped
    networks:
      default:
        aliases:
          - dmsaibridge_redis
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a ${CACHE_REDIS_PASSWORD} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  server:
    image: ranktotop/dmsaibridge:latest
    entrypoint: ["/app/.docker/entrypoint.sh"]
    env_file: [stack.env]
    environment:
      # general
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # cache
      CACHE_ENGINE: "redis"
      CACHE_REDIS_BASE_URL: "redis://dmsaibridge_redis:6379"
      CACHE_REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      CACHE_REDIS_DB: 0
      CACHE_REDIS_DEFAULT_TTL_SECONDS: 86400
    ports:
      - ${API_PORT:-8000}:8000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      default:
        aliases:
          - dmsaibridge_server

  file_ingestion:
    image: ranktotop/dmsaibridge:latest
    entrypoint: ["/app/.docker/entrypoint-file-ingestion.sh"]
    env_file: [stack.env]
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      FILE_INGESTION_WATCH: ${FILE_INGESTION_WATCH:-true}
      FILE_INGESTION_PAPERLESS_PATH: /app/ingestion_paperless
      # cache
      CACHE_ENGINE: "redis"
      CACHE_REDIS_BASE_URL: "redis://dmsaibridge_redis:6379"
      CACHE_REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      CACHE_REDIS_DB: 0
      CACHE_REDIS_DEFAULT_TTL_SECONDS: 86400
    volumes:
      - ${FILE_INGESTION_PAPERLESS_PATH}:/app/ingestion_paperless
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      default:
        aliases:
          - dmsaibridge_file_ingestion

  mail_ingestion:
    image: ranktotop/dmsaibridge:latest
    entrypoint: ["/app/.docker/entrypoint-mail-ingestion.sh"]
    env_file: [stack.env]
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      MAIL_INGESTION_WATCH: ${MAIL_INGESTION_WATCH:-true}
      MAIL_INGESTION_POLL_INTERVAL_SECONDS: ${MAIL_INGESTION_POLL_INTERVAL_SECONDS:-300}
      # cache
      CACHE_ENGINE: "redis"
      CACHE_REDIS_BASE_URL: "redis://dmsaibridge_redis:6379"
      CACHE_REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      CACHE_REDIS_DB: 0
      CACHE_REDIS_DEFAULT_TTL_SECONDS: 86400
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      default:
        aliases:
          - dmsaibridge_mail_ingestion

  sync:
    image: ranktotop/dmsaibridge:latest
    entrypoint: ["/app/.docker/entrypoint-sync.sh"]
    env_file: [stack.env]
    environment:
      # general
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # cron
      SYNC_CRON: ${SYNC_CRON:-0 * * * *}
      # cache
      CACHE_ENGINE: "redis"
      CACHE_REDIS_BASE_URL: "redis://dmsaibridge_redis:6379"
      CACHE_REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      CACHE_REDIS_DB: 0
      CACHE_REDIS_DEFAULT_TTL_SECONDS: 86400
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      default:
        aliases:
          - dmsaibridge_sync

volumes:
  redis:

networks:
  default:
